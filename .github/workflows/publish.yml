name: Publish to VSCode Marketplace

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    environment: release

    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    
    permissions:
      contents: write  # Required to upload release assets
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run linter
      run: npm run lint
    
    - name: Compile TypeScript (Production)
      run: npm run compile:prod
    
    - name: Package extension
      run: npm run package
    
    - name: Ensure GitHub Release and upload VSIX
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        TAG="${{ github.ref_name }}"
        VSIX_FILE="$(ls *.vsix)"
        if gh release view "$TAG" >/dev/null 2>&1; then
          echo "Release $TAG exists. Uploading asset with --clobber"
          gh release upload "$TAG" "$VSIX_FILE" --clobber
        else
          echo "Creating release $TAG and uploading asset"
          gh release create "$TAG" "$VSIX_FILE" --title "$TAG" --notes "Automated release for $TAG" --latest
        fi
    
    - name: Publish to VSCode Marketplace
      env:
        VSCE_PAT: ${{ secrets.VSCE_PAT }}
      run: |
        npx vsce publish --packagePath $(ls *.vsix) -p $VSCE_PAT
    
    - name: Publish Summary
      run: |
        echo "✅ Extension published successfully to VSCode Marketplace!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Package Details:**" >> $GITHUB_STEP_SUMMARY
        ls -lh *.vsix >> $GITHUB_STEP_SUMMARY