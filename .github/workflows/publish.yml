name: Publish to VSCode Marketplace

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    environment: release

    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # Required to upload release assets
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run linter
      run: npm run lint
    
    - name: Compile TypeScript (Production)
      run: npm run compile:prod
    
    - name: Package extension
      run: npm run package
    
    - name: Create GitHub Release with VSIX
      uses: softprops/action-gh-release@v1
      with:
        files: '*.vsix'
        token: ${{ secrets.GITHUB_TOKEN }}
        fail_on_unmatched_files: true
        generate_release_notes: true
    
    - name: Publish to VSCode Marketplace
      env:
        VSCE_PAT: ${{ secrets.VSCE_PAT }}
      run: |
        npx vsce publish --packagePath $(ls *.vsix) -p $VSCE_PAT
    
    - name: Publish Summary
      run: |
        echo "✅ Extension published successfully to VSCode Marketplace!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Package Details:**" >> $GITHUB_STEP_SUMMARY
        ls -lh *.vsix >> $GITHUB_STEP_SUMMARY